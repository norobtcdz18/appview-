<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cloud Pro">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">
<link rel="manifest" href="manifest.json">
<title>مخزن مشاريع HTML | Cloud Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<style>
  :root {
    --bg-main: #0f172a;
    --bg-surface: #1e293b;
    --bg-surface-hover: #334155;
    --primary: #3b82f6;
    --primary-hover: #2563eb;
    --success: #10b981;
    --danger: #ef4444;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --border: #334155;
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg-main);
    color: var(--text-main);
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    overscroll-behavior: none;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    transform: translateX(-20px);
  }

  .screen.active {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(0);
    z-index: 10;
  }

  header {
    background: var(--bg-surface);
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow);
    z-index: 20;
  }

  header h1 { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 8px; color: var(--text-main); }
  
  /* تأثير انتقال ناعم للون السحابة */
  #cloudIcon { transition: color 0.3s ease; }

  .header-actions { display: flex; gap: 12px; }

  .icon-btn {
    background: transparent; color: var(--text-muted); border: none; font-size: 1.4rem;
    cursor: pointer; transition: 0.2s; width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-btn:active { background: var(--border); }
  .icon-btn.primary-text { color: var(--primary); }
  .icon-btn.success-text { color: var(--success); }

  .projects-container {
    flex: 1; overflow-y: auto; padding: 20px; display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; align-content: start;
  }

  .project-card {
    background: var(--bg-surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 16px; display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; transition: 0.2s; box-shadow: var(--shadow);
  }
  .project-card:active { transform: scale(0.98); background: var(--bg-surface-hover); }
  
  .project-info { display: flex; flex-direction: column; gap: 4px; flex: 1; overflow: hidden; }
  .project-title { font-size: 1.1rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .project-date { font-size: 0.8rem; color: var(--text-muted); }

  .delete-btn {
    color: var(--danger); background: rgba(239, 68, 68, 0.1); border: none; width: 40px; height: 40px;
    border-radius: 12px; font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
    cursor: pointer; margin-right: 12px; transition: 0.2s;
  }
  .delete-btn:active { background: rgba(239, 68, 68, 0.2); }

  .fab {
    position: fixed; bottom: 30px; left: 30px; width: 60px; height: 60px; border-radius: 50%;
    background: var(--primary); color: white; border: none; font-size: 2rem; display: flex;
    align-items: center; justify-content: center; box-shadow: 0 8px 16px rgba(59, 130, 246, 0.4);
    cursor: pointer; transition: 0.2s; z-index: 50;
  }
  .fab:active { transform: scale(0.9) rotate(45deg); }

  .editor-header-input {
    background: transparent; border: none; color: var(--text-main); font-family: 'Cairo', sans-serif;
    font-size: 1.1rem; font-weight: 600; text-align: center; flex: 1; padding: 4px 8px;
    margin: 0 10px; border-bottom: 2px solid transparent;
  }
  .editor-header-input:focus { outline: none; border-bottom-color: var(--primary); }

  .tabs-container {
    display: flex; background: var(--bg-surface); padding: 8px 20px; gap: 12px; border-bottom: 1px solid var(--border);
  }

  .tab-btn {
    flex: 1; padding: 10px; background: transparent; border: 1px solid var(--border); border-radius: 12px;
    color: var(--text-muted); font-family: 'Cairo', sans-serif; font-weight: 600; font-size: 0.95rem;
    cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .tab-btn.active { background: rgba(59, 130, 246, 0.1); color: var(--primary); border-color: var(--primary); }

  .workspace { flex: 1; position: relative; background: #0d1117; }
  .view-panel { position: absolute; inset: 0; display: none; flex-direction: column; }
  .view-panel.active { display: flex; }

  #codeEditor {
    flex: 1; width: 100%; background: #0d1117; color: #e2e8f0; border: none; padding: 16px;
    font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; resize: none; direction: ltr; text-align: left; line-height: 1.7;
  }
  #codeEditor:focus { outline: none; }
  
  #previewFrame { width: 100%; height: 100%; border: none; background: white; }

  /* زر الفولسكرين */
  .fullscreen-btn {
    position: absolute; bottom: 20px; left: 20px; width: 45px; height: 45px;
    background: var(--primary); color: white; border: none; border-radius: 50%;
    font-size: 1.5rem; display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 100; transition: 0.2s;
  }
  .fullscreen-btn:active { transform: scale(0.9); }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0;
    pointer-events: none; transition: 0.3s; padding: 20px;
  }
  .modal-overlay.show { opacity: 1; pointer-events: auto; }
  .modal-box { background: var(--bg-surface); width: 100%; max-width: 360px; border-radius: 20px; padding: 24px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); transform: translateY(20px); transition: 0.3s; }
  .modal-overlay.show .modal-box { transform: translateY(0); }
  .modal-box h3 { margin-bottom: 20px; font-size: 1.2rem; }
  .modal-box input { width: 100%; background: var(--bg-main); border: 1px solid var(--border); color: var(--text-main); padding: 14px 16px; border-radius: 12px; font-family: 'Cairo', sans-serif; font-size: 1rem; margin-bottom: 20px; }
  .modal-box input:focus { outline: none; border-color: var(--primary); }
  .modal-actions { display: flex; gap: 12px; }
  .modal-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; }
  .modal-btn.cancel { background: var(--bg-main); color: var(--text-main); }
  .modal-btn.confirm { background: var(--primary); color: white; }

  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: var(--success); color: white; padding: 12px 24px; border-radius: 30px;
    font-weight: 600; font-size: 0.95rem; z-index: 200; box-shadow: var(--shadow);
    opacity: 0; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; color: var(--text-muted); text-align: center; gap: 16px; }
  .empty-state i { font-size: 4rem; opacity: 0.5; }
  .empty-state p { font-size: 1.1rem; }
</style>
</head>
<body>

  <div id="homeScreen" class="screen active">
    <header>
      <h1><i id="cloudIcon" class="ri-cloud-fill" style="color: var(--success);"></i> السحابة</h1>
      <div class="header-actions">
        <button class="icon-btn" onclick="fetchProjectsData()" title="تحديث"><i class="ri-refresh-line"></i></button>
      </div>
    </header>
    
    <main class="projects-container" id="projectsList">
      <div class="empty-state">
        <i class="ri-loader-4-line ri-spin"></i>
        <p>جاري جلب المشاريع من السحابة...</p>
      </div>
    </main>

    <button class="fab" onclick="newProject()">
      <i class="ri-add-line"></i>
    </button>
  </div>

  <div id="editorScreen" class="screen">
    <header>
      <button class="icon-btn" onclick="closeProject()"><i class="ri-arrow-right-line"></i></button>
      <input type="text" id="projectName" class="editor-header-input" placeholder="اسم المشروع" oninput="updateName()">
      <div class="header-actions">
        <button class="icon-btn success-text" onclick="saveCurrent()"><i class="ri-save-3-fill"></i></button>
      </div>
    </header>

    <div class="tabs-container">
      <button class="tab-btn active" onclick="switchTab('editor', this)"><i class="ri-code-s-slash-line"></i> المحرر</button>
      <button class="tab-btn" onclick="switchTab('preview', this)"><i class="ri-eye-line"></i> المعاينة</button>
    </div>

    <div class="workspace">
      <div class="view-panel active" id="viewEditor">
        <textarea id="codeEditor" placeholder="" oninput="autoSave()"></textarea>
      </div>
      <div class="view-panel" id="viewPreview">
        <iframe id="previewFrame"></iframe>
        <button class="fullscreen-btn" onclick="toggleFullscreen()" title="ملء الشاشة"><i class="ri-fullscreen-line"></i></button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <h3 id="modalTitle">مشروع جديد</h3>
      <input type="text" id="modalInput" placeholder="اسم المشروع" autocomplete="off">
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="closeModal()">إلغاء</button>
        <button class="modal-btn confirm" id="modalConfirm">إنشاء</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
      apiKey: "AIzaSyCqqQIey88U8Aqz3Jb_-sXIudzrEzPZPnI",
      authDomain: "masarifi-4e451.firebaseapp.com",
      projectId: "masarifi-4e451",
      storageBucket: "masarifi-4e451.firebasestorage.app",
      messagingSenderId: "792484875097",
      appId: "1:792484875097:web:5df01e88e4b5af51121a48"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let projects = {};
    let currentId = null;
    let autoSaveTimer = null;

    // --- نظام تعقب حالة الإنترنت ---
    window.checkNetworkStatus = (showMessage = true) => {
      const cloudIcon = document.getElementById('cloudIcon');
      if (navigator.onLine) {
        cloudIcon.className = 'ri-cloud-fill'; // سحابة عادية
        cloudIcon.style.color = 'var(--success)'; // أخضر
        if(showMessage) window.showToast('متصل بالإنترنت', 'var(--success)', 'ri-wifi-line');
      } else {
        cloudIcon.className = 'ri-cloud-off-fill'; // سحابة مقطوعة
        cloudIcon.style.color = 'var(--danger)'; // أحمر
        if(showMessage) window.showToast('لا يوجد اتصال بالإنترنت', 'var(--danger)', 'ri-wifi-off-line');
      }
    };

    // الاستماع لتغيرات الشبكة
    window.addEventListener('online', () => window.checkNetworkStatus(true));
    window.addEventListener('offline', () => window.checkNetworkStatus(true));
    
    // فحص الحالة عند فتح الصفحة (بدون إشعار مزعج)
    window.checkNetworkStatus(false);
    // -----------------------------

    // دوال مساعدة
    window.escapeHtml = (s) => s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    
    window.showToast = (msg, bgColor = 'var(--success)', icon = 'ri-check-line') => {
      const existing = document.querySelector('.toast');
      if(existing) existing.remove();
      const t = document.createElement('div');
      t.className = 'toast';
      t.innerHTML = `<i class="${icon}"></i> ${msg}`;
      t.style.background = bgColor;
      document.body.appendChild(t);
      void t.offsetWidth;
      t.classList.add('show');
      setTimeout(() => {
        t.classList.remove('show');
        setTimeout(() => t.remove(), 300);
      }, 2500);
    };

    // جلب البيانات من فايربيز
    window.fetchProjectsData = async () => {
      if (!navigator.onLine) {
        window.showToast('يرجى التحقق من الاتصال بالإنترنت', 'var(--danger)', 'ri-wifi-off-line');
        return;
      }
      
      try {
        const querySnapshot = await getDocs(collection(db, "projects"));
        projects = {};
        querySnapshot.forEach((doc) => {
          projects[doc.id] = doc.data();
        });
        window.renderList();
      } catch (error) {
        console.error("Error fetching projects: ", error);
        window.showToast('خطأ في الاتصال بقاعدة البيانات', 'var(--danger)', 'ri-error-warning-line');
      }
    };

    window.renderList = () => {
      const list = document.getElementById('projectsList');
      const ids = Object.keys(projects).sort((a,b) => (projects[b].created || 0) - (projects[a].created || 0));
      
      if (ids.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <i class="ri-folder-open-line"></i>
            <p>لا توجد مشاريع سحابية بعد.<br>اضغط على + للبدء!</p>
          </div>
        `;
        list.style.display = 'block';
        return;
      }

      list.style.display = 'grid';
      list.innerHTML = ids.map(id => `
        <div class="project-card" onclick="loadProject('${id}')">
          <div class="project-info">
            <span class="project-title">${window.escapeHtml(projects[id].name)}</span>
            <span class="project-date">سحابي ☁️</span>
          </div>
          <button class="delete-btn" onclick="event.stopPropagation(); deleteProject('${id}')">
            <i class="ri-delete-bin-line"></i>
          </button>
        </div>
      `).join('');
    };

    window.navigateTo = (screenId) => {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    };

    window.loadProject = (id) => {
      currentId = id;
      const p = projects[id];
      document.getElementById('projectName').value = p.name;
      document.getElementById('codeEditor').value = p.code;
      window.navigateTo('editorScreen');
      if(document.querySelector('.tab-btn.active').innerText.includes('المعاينة')) {
        window.updatePreview();
      }
    };

    window.closeProject = () => {
      currentId = null;
      document.getElementById('codeEditor').value = '';
      window.renderList();
      window.navigateTo('homeScreen');
    };

    window.newProject = () => {
      if (!navigator.onLine) {
        window.showToast('لا يمكن إنشاء مشروع بدون إنترنت', 'var(--danger)', 'ri-wifi-off-line');
        return;
      }

      window.showModal('مشروع سحابي جديد', 'أدخل اسم المشروع', async (name) => {
        if (!name.trim()) return;
        const id = 'p_' + Date.now();
        const newProj = {
          name: name,
          code: '<!DOCTYPE html>\n<html lang="ar" dir="rtl">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>' + name + '</title>\n  <style>\n    body { font-family: system-ui, sans-serif; padding: 20px; }\n  </style>\n</head>\n<body>\n  <h1>مرحباً بك! 🚀</h1>\n</body>\n</html>',
          created: Date.now()
        };
        
        projects[id] = newProj;
        window.loadProject(id);
        
        try {
          await setDoc(doc(db, "projects", id), newProj);
          window.showToast('تم الإنشاء في السحابة', 'var(--success)', 'ri-cloud-fill');
        } catch (e) {
          window.showToast('حدث خطأ أثناء الحفظ', 'var(--danger)');
        }
      });
    };

    window.deleteProject = async (id) => {
      if (!navigator.onLine) {
        window.showToast('مطلوب إنترنت لحذف المشروع', 'var(--danger)', 'ri-wifi-off-line');
        return;
      }

      if (!confirm('هل أنت متأكد من الحذف نهائياً من السحابة؟')) return;
      delete projects[id];
      window.renderList();
      try {
        await deleteDoc(doc(db, "projects", id));
        window.showToast('تم الحذف سحابياً', 'var(--danger)', 'ri-delete-bin-line');
      } catch(e) {
        window.showToast('فشل الحذف', 'var(--danger)');
      }
    };

    window.saveCurrent = async () => {
      if (!currentId) return;
      if (!navigator.onLine) {
        window.showToast('حفظ مؤقت (لا يوجد إنترنت)', 'var(--danger)', 'ri-wifi-off-line');
        return;
      }

      projects[currentId].name = document.getElementById('projectName').value || 'بدون اسم';
      projects[currentId].code = document.getElementById('codeEditor').value;
      
      try {
        await setDoc(doc(db, "projects", currentId), projects[currentId]);
        window.showToast('تم الحفظ في السحابة', 'var(--success)', 'ri-cloud-check-fill');
      } catch(e) {
        window.showToast('مشكلة في الاتصال', 'var(--danger)');
      }
    };

    // حفظ تلقائي
    window.autoSave = () => {
      if (!currentId) return;
      clearTimeout(autoSaveTimer);
      projects[currentId].code = document.getElementById('codeEditor').value; 
      
      autoSaveTimer = setTimeout(async () => {
        if(navigator.onLine) {
          try {
            await setDoc(doc(db, "projects", currentId), projects[currentId]);
          } catch(e) {
            console.error("Auto-save failed");
          }
        }
      }, 3000); 
    };

    window.updateName = () => {
      if (!currentId) return;
      projects[currentId].name = document.getElementById('projectName').value;
      window.autoSave();
    };

    window.switchTab = (tab, el) => {
      document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('viewEditor').classList.toggle('active', tab === 'editor');
      document.getElementById('viewPreview').classList.toggle('active', tab === 'preview');
      if (tab === 'preview') window.updatePreview();
    };

    window.updatePreview = () => {
      const code = document.getElementById('codeEditor').value;
      const frame = document.getElementById('previewFrame');
      frame.srcdoc = code;
    };

    window.toggleFullscreen = () => {
      const frame = document.getElementById('previewFrame');
      if (!document.fullscreenElement) {
        if (frame.requestFullscreen) {
          frame.requestFullscreen();
        } else if (frame.webkitRequestFullscreen) { 
          frame.webkitRequestFullscreen();
        } else if (frame.msRequestFullscreen) { 
          frame.msRequestFullscreen();
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        }
      }
    };

    window.showModal = (title, placeholder, callback) => {
      document.getElementById('modalTitle').textContent = title;
      const input = document.getElementById('modalInput');
      input.value = '';
      input.placeholder = placeholder;
      document.getElementById('modal').classList.add('show');
      setTimeout(() => input.focus(), 300);
      const btn = document.getElementById('modalConfirm');
      const newBtn = btn.cloneNode(true);
      btn.parentNode.replaceChild(newBtn, btn);
      newBtn.onclick = () => { callback(input.value); window.closeModal(); };
      input.onkeydown = (e) => { if (e.key === 'Enter') { callback(input.value); window.closeModal(); } };
    };

    window.closeModal = () => { document.getElementById('modal').classList.remove('show'); };

    // تحميل البيانات عند فتح الصفحة
    if (navigator.onLine) {
      window.fetchProjectsData();
    }

    // تسجيل Service Worker للـ PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then((reg) => console.log('Service Worker مسجل:', reg.scope))
        .catch((err) => console.warn('فشل تسجيل Service Worker:', err));
    }
  </script>

</body>
</html>
